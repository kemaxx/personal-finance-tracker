<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Finance Dashboard</title>
    <!-- 1. The Bootstrap 5 CDN (The Interior Designer) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    
    <div id="login-view" class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 py-4 px-3">
                <div class="card-body text-center">
                    <h2 class="mb-4 fw-bold text-primary">Vault Login</h2>
                    <input type="text" id="login-username" class="form-control mb-3" placeholder="Username">
                    <input type="password" id="login-password" class="form-control mb-4" placeholder="Password">
                    <button id="login-btn" class="btn btn-primary w-100 mb-2" onclick="loginUser()">Login</button>
                    <button id="register-btn" class="btn btn-outline-secondary w-100" onclick="registerUser()">Create Account</button>
                    <div id="login-error" class="text-danger mt-3" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-view" class="row justify-content-center" style="display: none;">
        
        <div class="col-md-8 d-flex justify-content-end mb-2 gap-2">
            <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#passwordModal">Change Password</button>
            <button class="btn btn-sm btn-outline-danger" onclick="logoutUser()">Logout</button>

        </div>

        <div class="modal fade" id="passwordModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Change Password</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="pwd-message" class="alert d-none"></div>
                <div class="mb-3">
                    <label class="form-label">Current Password</label>
                    <input type="password" id="current-pwd" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" id="new-pwd" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="save-pwd-btn" onclick="submitPasswordChange()">Update Password</button>
            </div>
        </div>
    </div>
</div>

        <div class="col-md-8 mb-4">
            <div class="card shadow-sm text-center border-0">
                <div class="card-body py-5">
                    <h2 class="text-muted mb-3">Current Vault Balance</h2>
                    <h1 class="display-3 text-success fw-bold" id="balance-display">₦ ---</h1>
                    <button class="btn btn-primary btn-lg mt-3 px-5" onclick="loadDashboard()">
                        Refresh Dashboard
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-8 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h4 class="mb-0">Add New Transaction</h4>
                </div>
                <div class="card-body">
                    <form id="transaction-form" onsubmit="submitTransaction(event)">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Date</label>
                                <input type="date" class="form-control" id="date" required>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label">Description</label>
                                <input type="text" class="form-control" id="description" placeholder="e.g., Uber to Airport" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Amount (₦)</label>
                                <input type="number" step="0.01" class="form-control" id="amount" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="category" required>
                                <option value="" disabled selected>Loading categories...</option>
                                </select>
                            </div>
                            <div class="col-md-4 d-flex align-items-end">
                                <button type="submit" class="btn btn-success w-100">Save Transaction</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h4 class="mb-0">Recent Transactions</h4>
                </div>
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th class="text-end">Amount</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-body">
                            <tr><td colspan="4" class="text-center text-muted">Click Refresh to load data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        </div>
</div>

<!-- 2. The JavaScript (The Electricity) -->
<script>
    // 1. We NO LONGER hardcode the API key here!
    
    // 2. A dynamic function to grab the token from the browser's vault
    function getHeaders() {
        const token = localStorage.getItem("jwt_token");
        return {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}` // <--- This is the new Bouncer format!
        };
    }

    // 3. The App Initialization
    function initApp() {
        const token = localStorage.getItem("jwt_token");
        if (token) {
            // If they have a token, show dashboard and hide login!
            document.getElementById("login-view").style.display = "none";
            document.getElementById("dashboard-view").style.display = "flex";
            loadDashboard();
        } else {
            // If no token, show login!
            document.getElementById("login-view").style.display = "flex";
            document.getElementById("dashboard-view").style.display = "none";
        }
    }

    async function loginUser() {
        const user = document.getElementById("login-username").value;
        const pass = document.getElementById("login-password").value;
        const errorDiv = document.getElementById("login-error");
        
        // 1. Grab BOTH buttons!
        const loginBtn = document.getElementById("login-btn");
        const registerBtn = document.getElementById("register-btn");
        
        // 2. Lock them BOTH down so the user can't click anything else
        loginBtn.disabled = true;
        registerBtn.disabled = true;
        
        // 3. Show the loading state on the button that was clicked
        loginBtn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Waking up vault...`;
        errorDiv.style.display = "none";
        
        try {
            const response = await fetch("https://personal-finance-tracker-k080.onrender.com/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: user, password: pass })
            });
            
            const json = await response.json();
            
            if (response.ok) {
                localStorage.setItem("jwt_token", json.token);
                errorDiv.style.display = "none";
                initApp(); // Reload the UI to show the dashboard
            } else {
                errorDiv.innerText = json.error;
                errorDiv.style.display = "block";
            }
        } catch (e) { 
            console.error(e); 
            errorDiv.innerText = "Network Error: Server might be waking up. Please try again in 60 seconds.";
            errorDiv.style.display = "block";
        } finally {
            // 4. Unlock BOTH buttons when the process is completely finished
            loginBtn.disabled = false;
            registerBtn.disabled = false;
            loginBtn.innerHTML = "Login";
        }
    }

    async function registerUser() {
        const user = document.getElementById("login-username").value;
        const pass = document.getElementById("login-password").value;
        const errorDiv = document.getElementById("login-error");
        
        // 1. Grab BOTH buttons!
        const loginBtn = document.getElementById("login-btn");
        const registerBtn = document.getElementById("register-btn");
        
        // 2. Lock them BOTH down
        loginBtn.disabled = true;
        registerBtn.disabled = true;
        
        // 3. Show the loading state on the register button
        registerBtn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Creating Vault...`;
        errorDiv.style.display = "none";
        
        try {
            const response = await fetch("https://personal-finance-tracker-k080.onrender.com/api/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: user, password: pass })
            });
            
            if (response.ok) {
                alert("Account created! You can now log in.");
            } else {
                const json = await response.json();
                errorDiv.innerText = json.error;
                errorDiv.style.display = "block";
            }
        } catch (e) { 
            console.error(e); 
            errorDiv.innerText = "Network Error: Server might be waking up. Please try again in 60 seconds.";
            errorDiv.style.display = "block";
        } finally {
            // 4. Unlock BOTH buttons when finished
            loginBtn.disabled = false;
            registerBtn.disabled = false;
            registerBtn.innerHTML = "Create Account";
        }
    }

    function logoutUser() {
        // Destroy the token and kick them back to the login screen!
        localStorage.removeItem("jwt_token");
        initApp();
    }

    
    // Run initApp immediately when the page loads!
    window.onload = initApp;

    async function loadDashboard() {
        fetchBalance();
        fetchTransactions();
        fetchCategories(); // <--- ADD THIS LINE!
    }

    // Function 1: Get the Balance
    async function fetchBalance() {
        const display = document.getElementById("balance-display");
        try {
            const response = await fetch("https://personal-finance-tracker-k080.onrender.com/api/balance", { headers: getHeaders() });
            const json = await response.json();
            if (response.ok) {
                const formatted = json.data.total_balance.toLocaleString('en-US', { minimumFractionDigits: 2 });
                display.innerText = `₦ ${formatted}`;
            }
        } catch (e) { display.innerText = "Error"; }
    }

    // Function 4: Fetch Categories and populate the dropdown!
    async function fetchCategories() {
        const dropdown = document.getElementById("category");
        try {
            const response = await fetch("https://personal-finance-tracker-k080.onrender.com/api/categories", { headers: getHeaders() });
            const json = await response.json();
            
            if (response.ok) {
                // Clear the "Loading..." text
                dropdown.innerHTML = '<option value="" disabled selected>Select a Category...</option>';
                
                // Loop through the data and create an option for each one!
                json.data.forEach(cat => {
                    // The user sees the Name, but the form submits the ID!
                    dropdown.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                });
            }
        } catch (e) { 
            dropdown.innerHTML = '<option value="" disabled>Error loading categories</option>'; 
        }
    }

    // Function 2: Get the Top 5 Transactions
    async function fetchTransactions() {
        const tbody = document.getElementById("transactions-body");
        try {
            // Notice we use the Query Parameters we built earlier! page=1 & per_page=5
            const response = await fetch("https://personal-finance-tracker-k080.onrender.com/api/transactions/recent", { headers: getHeaders() });
            const json = await response.json();
            
            if (response.ok) {
                tbody.innerHTML = ""; // Clear out the loading text
                
                // Loop through the 5 items and create an HTML row for each one
                json.data.forEach(txn => {
                    const formattedAmount = txn.amount.toLocaleString('en-US', { minimumFractionDigits: 2 });
                    
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="badge bg-secondary">${txn.date}</span></td>
                            <td class="fw-bold">${txn.description}</td>
                            <td>${txn.category}</td>
                            <td class="text-end fw-bold">₦ ${formattedAmount}</td>
                        </tr>
                    `;
                });
            }
        } catch (e) { tbody.innerHTML = "<tr><td colspan='4'>Error loading data</td></tr>"; }
    }

    // Function 3: Submit a new transaction
    async function submitTransaction(event) {
        // 1. Stop the HTML form from refreshing the page!
        event.preventDefault(); 

        // 2. Grab the values the user typed into the input boxes
        const dateVal = document.getElementById("date").value;
        const descVal = document.getElementById("description").value;
        const amountVal = document.getElementById("amount").value;
        const catVal = document.getElementById("category").value;

        // 3. Build the JSON payload exactly how our Flask API expects it
        const payload = {
            date: dateVal,
            description: descVal,
            amount: parseFloat(amountVal),
            category_id: parseInt(catVal),
            payment_method: "Card" // Hardcoding this for now!
        };

        try {
            // 4. Send the POST request to the API
            // NEW VERSION:
            const response = await fetch("https://personal-finance-tracker-k080.onrender.com/api/transactions", {
                method: "POST",
                headers: getHeaders(),          // <--- We just drop the new Bouncer in here!
                body: JSON.stringify(payload)   // <--- KEEP THIS! This is the actual data!
            });
            
            if (response.ok) {
                // 5. If it worked, clear the form and refresh the dashboard!
                document.getElementById("transaction-form").reset();
                loadDashboard(); 
                alert("Transaction added successfully!");
            } else {
                alert("Error saving transaction. Check your API.");
            }
        } catch (e) {
            console.error(e);
            alert("Network Error!");
        }
    }

    async function submitPasswordChange() {
        const currentPwd = document.getElementById("current-pwd").value;
        const newPwd = document.getElementById("new-pwd").value;
        const msgDiv = document.getElementById("pwd-message");
        const btn = document.getElementById("save-pwd-btn");

        // 1. Basic validation
        if (!currentPwd || !newPwd) {
            msgDiv.className = "alert alert-warning";
            msgDiv.innerText = "Please fill in both fields.";
            msgDiv.classList.remove("d-none");
            return;
        }

        // 2. Lock the button and show the spinner
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Updating...`;
        msgDiv.classList.add("d-none");

        try {
            // 3. Call the API endpoint!
            const response = await fetch("https://personal-finance-tracker-k080.onrender.com/api/change-password", {
                method: "PUT",
                headers: getHeaders(), // <--- The JWT Bouncer pass!
                body: JSON.stringify({ current_password: currentPwd, new_password: newPwd })
            });

            const json = await response.json();

            if (response.ok) {
                // Success! Make the alert green and tell them what's happening
                msgDiv.className = "alert alert-success";
                msgDiv.innerText = json.message + " Logging you out securely...";
                msgDiv.classList.remove("d-none");
                
                // Clear the inputs
                document.getElementById("current-pwd").value = "";
                document.getElementById("new-pwd").value = "";
                
                // Wait exactly 2 seconds, hide the modal, and kick them out!
                setTimeout(() => {
                    const modalElement = document.getElementById('passwordModal');
                    const modal = bootstrap.Modal.getInstance(modalElement);
                    modal.hide();
                    
                    logoutUser(); // Kicks them back to the login screen
                }, 2000);
                
            } else {
                // Failed (Wrong password). Make the alert red!
                msgDiv.className = "alert alert-danger";
                msgDiv.innerText = json.error;
                msgDiv.classList.remove("d-none");
            }
        } catch (e) {
            msgDiv.className = "alert alert-danger";
            msgDiv.innerText = "Network Error.";
            msgDiv.classList.remove("d-none");
        } finally {
            // 4. Unlock the button
            btn.disabled = false;
            btn.innerHTML = "Update Password";
        }
    }
    
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
